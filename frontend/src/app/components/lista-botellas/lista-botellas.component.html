<div class="fade-up">
  <div class="page-header">
    <h2>Catálogo
      <span class="contador-badge">{{ totalBotellas }}</span>
    </h2>
    <button class="btn-primary-custom" (click)="irAAgregar()">+ Agregar botella</button>
  </div>

  @if (cargando) {
    <div class="loading-wrapper">
      <div class="spinner-custom"></div>
      <p style="color: var(--text-muted);">Cargando botellas...</p>
    </div>
  } @else if (botellas.length === 0) {
    <p style="color: var(--text-muted); text-align:center; padding: 3rem 0;">
      No hay botellas registradas.
    </p>
  } @else {
    <div class="botellas-grid">
      @for (botella of botellas; track botella.id) {
        <app-botella-card
          [botella]="botella"
          (verDetalle)="irADetalle($event)"
          (editar)="irAEditar($event)"
          (eliminar)="eliminar($event)">
        </app-botella-card>
      }
    </div>
  }
</div>
