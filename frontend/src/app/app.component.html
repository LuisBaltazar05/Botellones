<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="logo.jpeg" alt="BotellonesMx" class="sidebar-logo">
      <div>
        <div class="sidebar-name">BotellonesMx</div>
        <div class="sidebar-sub">Catálogo</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/inicio"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }">
        <span class="nav-icon">🏠</span> Inicio
      </a>
      <a routerLink="/lista" routerLinkActive="active">
        <span class="nav-icon">📦</span> Catálogo
      </a>
      <a routerLink="/buscar" routerLinkActive="active">
        <span class="nav-icon">🔍</span> Buscar
      </a>
      <a routerLink="/agregar" routerLinkActive="active">
        <span class="nav-icon">➕</span> Agregar botella
      </a>
      <a routerLink="/carrito" routerLinkActive="active" class="nav-cart">
        <span class="nav-icon">🛒</span>
        Carrito
        @if (carrito.totalItems() > 0) {
          <span class="cart-badge">{{ carrito.totalItems() }}</span>
        }
      </a>
    </nav>

    <div class="sidebar-footer">
      BotellonesMx © 2026
    </div>
  </aside>

  <!-- ── Contenido ── -->
  <main class="main">
    <router-outlet></router-outlet>
  </main>

</div>

<!-- ── Diálogo de confirmación ── -->
@if (confirm.visible()) {
  <div class="confirm-overlay">
    <div class="confirm-box">
      <p class="confirm-msg">{{ confirm.mensaje() }}</p>
      <div class="confirm-actions">
        <button class="btn btn-danger" (click)="confirm.confirmar()">Eliminar</button>
        <button class="btn btn-ghost" (click)="confirm.cancelar()">Cancelar</button>
      </div>
    </div>
  </div>
}

<!-- ── Toast Notificaciones ── -->
<div class="toast-container">
  @for (n of notificaciones.lista(); track n.id) {
    <div class="toast-item" [class]="'toast-' + n.tipo">
      <span>{{ n.texto }}</span>
      <button class="toast-close" (click)="notificaciones.cerrar(n.id)">✕</button>
    </div>
  }
</div>
